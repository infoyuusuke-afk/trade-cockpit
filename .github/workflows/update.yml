name: Update Trade Cockpit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/update.py"
      - "scripts/signal_scan.py"
      - "scripts/morning_review.py"
      - "watchlist.json"
      - "requirements.txt"
      - ".github/workflows/update.yml"
  schedule:
    - cron: "30 23 * * *" # 08:30 JST
    - cron: "30 2 * * 1-5" # 11:30 JST, morning-session review
    - cron: "35 6 * * 1-5" # 15:35 JST, after the Tokyo market close

permissions:
  contents: write

concurrency:
  group: update-trade-cockpit
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Update cockpit data
        env:
          TZ: Asia/Tokyo
        run: |
          python scripts/signal_scan.py
          python scripts/update.py
          python scripts/morning_review.py

      - name: Commit and push updated files
        run: |
          if git diff --quiet -- index.html data.json signals.json morning_snapshot.json paper_trade_history.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data.json signals.json
          test ! -f morning_snapshot.json || git add morning_snapshot.json
          test ! -f paper_trade_history.json || git add paper_trade_history.json
          git commit -m "Auto-update trade cockpit"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push; then
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "Failed to push cockpit update after 3 attempts."
          exit 1
