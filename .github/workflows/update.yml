name: Update Trade Cockpit

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * *" # 08:30 JST
    - cron: "0 6 * * *"   # 15:00 JST

permissions:
  contents: write

concurrency:
  group: update-trade-cockpit
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Update cockpit data
        env:
          TZ: Asia/Tokyo
        run: python scripts/update.py

      - name: Commit and push updated files
        run: |
          if git diff --quiet -- index.html data.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data.json
          git commit -m "Auto-update trade cockpit"
          git push
